name: Auto Publish Videos

on:
  schedule:
    # Run 4 times a day at:
    # - 6:00 AM UTC
    # - 12:00 PM UTC
    # - 6:00 PM UTC
    # - 11:00 PM UTC
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  publish-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Prevent hanging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # Cache pip dependencies for faster runs

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check required secrets
        run: |
          echo "Checking required environment variables..."
          required_secrets=(
            "GOOGLE_SERVICE_ACCOUNT_KEY"
            "GOOGLE_DRIVE_FOLDER_ID"
            "INSTAGRAM_ACCESS_TOKEN"
            "INSTAGRAM_ACCOUNT_ID"
            "FACEBOOK_ACCESS_TOKEN"
            "FACEBOOK_PAGE_ID"
            "THREADS_ACCESS_TOKEN"
            "THREADS_USER_ID"
            "POLLINATIONS_API_KEY"
          )

          missing=0
          for secret in "${required_secrets[@]}"; do
            if [ -z "${!secret}" ]; then
              echo "❌ Missing: $secret"
              missing=1
            else
              echo "✅ Found: $secret"
            fi
          done

          if [ $missing -eq 1 ]; then
            echo "❌ Some required secrets are missing!"
            exit 1
          fi

          echo "✅ All required secrets are present"
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}

      - name: Debug Google Drive Connection
        run: |
          echo "=== DEBUG: Google Drive Connection ==="
          echo "Folder ID length: ${#GOOGLE_DRIVE_FOLDER_ID}"
          echo "Service Account Key length: ${#GOOGLE_SERVICE_ACCOUNT_KEY}"
          
          if [ -z "$GOOGLE_DRIVE_FOLDER_ID" ]; then
            echo "❌ ERROR: GOOGLE_DRIVE_FOLDER_ID is empty!"
            exit 1
          fi
          
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_KEY" ]; then
            echo "❌ ERROR: GOOGLE_SERVICE_ACCOUNT_KEY is empty!"
            exit 1
          fi
          
          # Create a test script to list files
          cat > test_drive.py << 'EOF'
import os
import json
import tempfile
from google.oauth2 import service_account
from googleapiclient.discovery import build

folder_id = os.getenv('GOOGLE_DRIVE_FOLDER_ID')
sa_key = os.getenv('GOOGLE_SERVICE_ACCOUNT_KEY')

print(f"Folder ID: {folder_id}")
print(f"Service Account Key starts with: {sa_key[:20]}...")

# Write SA key to temp file
temp_file = tempfile.NamedTemporaryFile(mode='w', suffix='.json', delete=False)
temp_file.write(sa_key)
temp_file.close()

try:
    creds = service_account.Credentials.from_service_account_file(temp_file.name, 
        scopes=['https://www.googleapis.com/auth/drive.readonly'])
    service = build('drive', 'v3', credentials=creds)
    
    # List files in folder
    results = service.files().list(
        q=f"'{folder_id}' in parents and trashed=false",
        fields="files(id, name, mimeType)",
        spaces='drive'
    ).execute()
    
    files = results.get('files', [])
    print(f"\n✅ Found {len(files)} file(s) in folder:")
    for f in files[:10]:
        print(f"  - {f.get('name')} ({f.get('mimeType')})")
    if len(files) > 10:
        print(f"  ... and {len(files) - 10} more")
    
    if not files:
        print("\n⚠️  Folder appears empty or permissions issue!")
        print("Check: 1) Folder ID is correct")
        print("       2) Service account has access to folder")
        
finally:
    os.unlink(temp_file.name)
EOF
          
          python test_drive.py
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

      - name: Run automation pipeline
        env:
          # Google Drive
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          LOCAL_INPUT_DIR: Videos

          # Instagram
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}

          # Facebook
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}

          # Threads
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}

          # YouTube (optional)
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

          # AI Caption
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          AI_MODEL: openai
        run: |
          echo "Starting automation pipeline..."
          python auto_pipeline.py
          exit_code=$?

          if [ $exit_code -ne 0 ]; then
            echo "❌ Pipeline failed with exit code $exit_code"
            exit $exit_code
          fi

          echo "✅ Pipeline completed successfully"
      
      - name: Commit published videos log
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add only the log file (not large video files)
          git add published_videos.json 2>/dev/null || true
          
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Update published videos log [skip ci]"
            git push
            echo "✅ Committed and pushed published_videos.json"
          else
            echo "ℹ️ No changes to commit"
          fi
